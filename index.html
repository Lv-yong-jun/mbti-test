<title>骨子里的你｜隐藏人格测试</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html{height:100%}
body{font-family:'PingFang SC','Helvetica Neue',Arial,sans-serif;background:#0a0a1a;color:#fff;min-height:100vh;overflow-x:hidden}

/* 开屏页 */
#start-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;padding:24px 20px;overflow-y:auto;-webkit-overflow-scrolling:touch}

.start-badge{display:inline-block;background:linear-gradient(90deg,#ff6ec4,#7928ca);padding:6px 20px;border-radius:50px;font-size:13px;font-weight:600;letter-spacing:1px;margin-bottom:24px;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:0.8;transform:scale(0.97)}}
.start-icon{font-size:72px;margin-bottom:20px;animation:float 3s ease-in-out infinite}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.start-title{font-size:28px;font-weight:800;text-align:center;margin-bottom:10px;background:linear-gradient(90deg,#ff6ec4,#ffd700,#ff6ec4);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-size:200% auto;animation:shimmer 3s linear infinite;line-height:1.4}
@keyframes shimmer{0%{background-position:0% center}100%{background-position:200% center}}
.start-subtitle{font-size:15px;color:#b0b0d0;text-align:center;margin-bottom:32px;line-height:1.7}
.start-meta{display:flex;gap:16px;margin-bottom:32px;flex-wrap:wrap;justify-content:center}
.meta-tag{display:flex;align-items:center;gap:6px;font-size:13px;color:#888}
.meta-tag span{font-size:18px}
.start-btn{display:block;width:100%;max-width:300px;padding:15px 36px;background:linear-gradient(90deg,#ff6ec4,#7928ca);color:#fff;border:none;border-radius:50px;font-size:17px;font-weight:700;cursor:pointer;transition:all 0.3s;letter-spacing:2px;box-shadow:0 4px 20px rgba(121,40,202,0.4)}
.start-btn:active{transform:scale(0.96)}
.start-note{font-size:12px;color:#555;margin-top:14px;text-align:center}

/* 进度条 */
#progress-bar{position:fixed;top:0;left:0;height:3px;background:linear-gradient(90deg,#ff6ec4,#7928ca);z-index:200;transition:width 0.4s ease;width:0%}

/* 题目页 */
#quiz-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);display:none;flex-direction:column;padding:50px 16px 16px;overflow:hidden;min-height:100vh}

.q-header{display:flex;justify-content:space-between;align-items:center;padding:0 4px;flex-shrink:0;margin-bottom:12px}
.q-back{background:none;border:none;color:#888;font-size:28px;cursor:pointer;padding:8px;line-height:1}
.q-step{font-size:13px;color:#666}

.q-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:0 4px 8px}
.q-card{background:rgba(255,255,255,0.05);border-radius:18px;padding:22px 18px;margin-bottom:14px}
.q-emoji{font-size:44px;text-align:center;margin-bottom:14px}
.q-text{font-size:20px;font-weight:700;text-align:center;line-height:1.6;margin-bottom:6px;word-break:break-word}
.q-sub{font-size:13px;color:#888;text-align:center;margin-bottom:22px}

.opt-list{display:flex;flex-direction:column;gap:10px}
.opt-item{display:flex;align-items:flex-start;gap:12px;padding:14px 16px;background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.1);border-radius:13px;cursor:pointer;transition:all 0.25s;font-size:15px;line-height:1.55;word-break:break-word;min-height:52px}
.opt-item:active{transform:scale(0.985)}
.opt-item .opt-icon{font-size:20px;flex-shrink:0;margin-top:1px;width:24px;text-align:center}
.opt-item .opt-text{flex:1;padding-top:1px}

.q-footer{padding:10px 4px 0;flex-shrink:0}
.next-btn{width:100%;padding:15px;background:linear-gradient(90deg,#ff6ec4,#7928ca);color:#fff;border:none;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;opacity:0.35;transition:all 0.3s;letter-spacing:1px}
.next-btn.active{opacity:1}
.next-btn:active{transform:scale(0.98)}

/* 结果页 */
#result-screen{position:fixed;inset:0;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);display:none;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:32px 16px 30px;min-height:100vh}
.res-inner{max-width:480px;margin:0 auto}

.res-badge{display:inline-block;background:linear-gradient(90deg,#ff6ec4,#7928ca);padding:5px 18px;border-radius:50px;font-size:12px;font-weight:600;margin-bottom:18px}
.res-title{font-size:15px;color:#b0b0d0;text-align:center;margin-bottom:5px}
.res-type{font-size:52px;font-weight:900;text-align:center;margin-bottom:3px;background:linear-gradient(135deg,#ff6ec4,#ffd700);-webkit-background-clip:text;-webkit-text-fill-color:transparent;line-height:1.2}
.res-name{font-size:24px;font-weight:800;text-align:center;color:#fff;margin-bottom:18px}
.res-tags{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;margin-bottom:22px}
.res-tag{padding:5px 13px;background:rgba(255,110,196,0.15);border:1px solid rgba(255,110,196,0.3);border-radius:50px;font-size:12px;color:#ff6ec4}

.res-card{background:rgba(255,255,255,0.05);border-radius:18px;padding:20px 18px;margin-bottom:14px;word-break:break-word}
.res-section{display:flex;align-items:flex-start;gap:12px;margin-bottom:18px}
.res-section:last-child{margin-bottom:0}
.res-icon{font-size:26px;flex-shrink:0;margin-top:1px}
.res-label{font-size:13px;color:#888;margin-bottom:4px}
.res-value{font-size:15px;font-weight:600;line-height:1.6}
.res-bar-wrap{display:flex;align-items:center;gap:10px;margin-top:6px}
.res-bar{flex:1;height:8px;background:rgba(255,255,255,0.1);border-radius:10px;overflow:hidden}
.res-bar-fill{height:100%;border-radius:10px;transition:width 1s ease}
.res-pct{font-size:12px;color:#888;flex-shrink:0}
.res-desc{font-size:14px;line-height:1.8;color:#ccc;margin-top:8px}

.share-btn{display:block;width:100%;max-width:480px;padding:15px;background:linear-gradient(90deg,#ff6ec4,#7928ca);color:#fff;border:none;border-radius:50px;font-size:16px;font-weight:700;cursor:pointer;letter-spacing:1px;margin-top:10px;box-shadow:0 4px 20px rgba(121,40,202,0.4)}
.share-btn:active{transform:scale(0.98)}
.retry-btn{display:block;width:100%;max-width:480px;padding:13px;background:rgba(255,255,255,0.08);color:#888;border:none;border-radius:50px;font-size:14px;cursor:pointer;margin-top:10px}

.res-footer{font-size:12px;color:#444;text-align:center;margin-top:20px;line-height:1.6;padding-bottom:20px}

/* 滑动动画 */
.slide-up{animation:slideUp 0.4s ease forwards}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
.fade-in{animation:fadeIn 0.5s ease forwards}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
</style>
</head>

  <div class="q-footer">

let currentQ = 0;
let answers = [];

function startQuiz(){
  document.getElementById('start-screen').style.display='none';
  document.getElementById('quiz-screen').style.display='flex';
  currentQ = 0;
  answers = [];
  renderQuestion();
}

function renderQuestion(){
  const q = questions[currentQ];
  document.getElementById('q-step').textContent = (currentQ+1)+'/'+questions.length;
  document.getElementById('q-emoji').textContent = q.emoji;
  document.getElementById('q-text').textContent = q.text;
  document.getElementById('q-sub').textContent = q.sub;

  const optList = document.getElementById('opt-list');
  optList.innerHTML = '';
  q.options.forEach((opt, i)=>{
    const div = document.createElement('div');
    div.className = 'opt-item';
    div.innerHTML = '<span class="opt-icon">'+(i+1)+'</span><span class="opt-text">'+opt.text+'</span>';
    div.addEventListener('click', ()=>selectOption(i, div), {passive:true});
    optList.appendChild(div);
  });

  document.getElementById('next-btn').classList.remove('active');
  document.getElementById('q-card').classList.remove('slide-up');
  void document.getElementById('q-card').offsetWidth;
  document.getElementById('q-card').classList.add('slide-up');

  document.getElementById('progress-bar').style.width = (currentQ/questions.length*100)+'%';
  
  // 滚动到顶部
  document.getElementById('q-scroll').scrollTop = 0;
}

function selectOption(idx, el){
  document.querySelectorAll('.opt-item').forEach(e=>{
    e.style.borderColor='rgba(255,255,255,0.1)';
    e.style.background='rgba(255,255,255,0.06)';
  });
  el.style.borderColor='#ff6ec4';
  el.style.background='rgba(255,110,196,0.15)';
  answers[currentQ] = questions[currentQ].options[idx].mbti;
  document.getElementById('next-btn').classList.add('active');
}

function nextQuestion(){
  if(!answers[currentQ]) return;
  if(currentQ < questions.length-1){
    currentQ++;
    renderQuestion();
  } else {
    showResult();
  }
}

function prevQuestion(){
  if(currentQ>0){
    currentQ--;
    renderQuestion();
    if(answers[currentQ]){
      document.querySelectorAll('.opt-item').forEach((el,i)=>{
        if(questions[currentQ].options[i].mbti === answers[currentQ]){
          el.style.borderColor='#ff6ec4';
          el.style.background='rgba(255,110,196,0.15)';
          document.getElementById('next-btn').classList.add('active');
        }
      });
    }
  } else {
    document.getElementById('quiz-screen').style.display='none';
    document.getElementById('start-screen').style.display='flex';
    document.getElementById('progress-bar').style.width='0%';
  }
}

function calcType(){
  let t='';
  t += answers.filter(v=>v==='E').length >= answers.filter(v=>v==='I').length ? 'E':'I';
  t += answers.filter(v=>v==='N').length >= answers.filter(v=>v==='S').length ? 'N':'S';
  t += answers.filter(v=>v==='T').length >= answers.filter(v=>v==='F').length ? 'T':'F';
  t += answers.filter(v=>v==='J').length >= answers.filter(v=>v==='P').length ? 'J':'P';
  return t;
}

function showResult(){
  document.getElementById('quiz-screen').style.display='none';
  document.getElementById('result-screen').style.display='block';
  document.getElementById('progress-bar').style.width='100%';

  const finalType = calcType();
  const typeInfo = mbtiTypes[finalType] || mbtiTypes["ENFP"];

  const I=answers.filter(v=>v==='I').length, E=answers.filter(v=>v==='E').length;

  const socialLabel=socialScore>=70?"高内耗型：外表冷静内心戏超多":socialScore>=50?"中等型：看场合切换模式":"低内耗型：社交对你来说很轻松";

  const workDesc=workScore>=70?"你是一个可靠、高效的人。制定计划并执行是你最大的力量，但偶尔的'不按计划'也会带来惊喜。":workScore>=50?"你有明确的目标感，也知道何时需要变通。你不是教条主义，而是实用主义者。":"你讨厌被困在框架里，你的力量在于灵活和创意。但有时候'定下来'也是必要的。";

  const subTags=[];
  if(answers.filter(v=>v==='E').length>=2) subTags.push("社交活跃");
  if(answers.filter(v=>v==='I').length>=2) subTags.push("独处充电");
  if(answers.filter(v=>v==='N').length>=2) subTags.push("直觉系");
  if(answers.filter(v=>v==='S').length>=2) subTags.push("务实派");
  if(answers.filter(v=>v==='T').length>=2) subTags.push("逻辑控");
  if(answers.filter(v=>v==='F').length>=2) subTags.push("共情体质");
  if(answers.filter(v=>v==='J').length>=2) subTags.push("计划党");
  if(answers.filter(v=>v==='P').length>=2) subTags.push("自由人");

  const color1=typeInfo.color, color2='#7928ca';

  const careerAdvice = {
    "INTJ":"🎯 战略规划、数据分析、咨询顾问、软件开发。你擅长深度思考和系统设计，适合在专业领域深耕。",
    "INTP":"🔬 研究员、数据科学家、作家、哲学/学术。你有强烈的好奇心和逻辑思维，适合知识创造类工作。",
    "ENTJ":"⚡ 创业者、高管、律师、咨询顾问。你天生的领导力和决策力，能带领团队达成目标。",
    "ENTP":"💡 策划、媒体人、投资人、销售。你点子多、反应快、善于沟通，适合挑战性工作。",
    "INFJ":"🌿 心理咨询师、教师、公益从业者、作家。你的共情能力和价值观，能帮助很多人。",
    "INFP":"🎨 设计师、心理咨询师、作家、音乐人。你的审美和感受力，是创作的源泉。",
    "ENFJ":"🔥 管理培训、人力资源、导师、销售。你能激励他人，适合影响和帮助别人成长的工作。",
    "ENFP":"✨ 策划、传媒、市场、创业。你热情有创意，喜欢自由，适合有挑战性的工作。",
    "ISTJ":"📐 财务、法律、行政、医生。你的可靠和严谨，是任何团队的定海神针。",
    "ISFJ":"🛡️ 护士、教师、HR、服务行业。你默默付出，是朋友最可靠的依靠。",
    "ESTJ":"🏢 金融、物流、项目管理。你务实高效，是天生的管理者。",
    "ESFJ":"🎁 公关、销售、教师、服务业。你的热情和体贴，让周围的人都很舒服。",
    "ISTP":"🔧 工程师、技术人员、设计师。你动手能力强，讨厌空洞的理论。",
    "ISFP":"🎭 设计师、摄影师、造型师。你的审美和品位，是骨子里的天赋。",
    "ESTP":"🚀 销售、商务、市场、创业者。你活在当下，行动力超强。",
    "ESFP":"🎪 演艺、主持、传媒、活动策划。你是人群中的焦点，天生表演者。"
  };

  document.getElementById('result-screen').innerHTML = 
  '<div class="res-inner fade-in">' +
    '<div class="res-badge" style="background:linear-gradient(90deg,'+color1+','+color2+')">🔥 隐藏人格揭晓</div>' +
    '<div class="res-title">你的MBTI人格是</div>' +
    '<div class="res-type">'+finalType+'</div>' +
    '<div class="res-name">'+typeInfo.emoji+' '+typeInfo.name+'</div>' +
    '<div class="res-tags">'+subTags.slice(0,4).map(t=>'<span class="res-tag">'+t+'</span>').join('')+'</div>' +

    '<div class="res-card" style="border-left:3px solid '+color1+'">' +
      '<div class="res-section"><div class="res-icon">🔍</div><div><div class="res-label">人格解读</div><div class="res-desc">'+typeInfo.desc+'</div></div></div>' +
    '</div>' +

    '<div class="res-card">' +
      '<div class="res-section"><div class="res-icon">🌀</div><div style="flex:1">' +
        '<div class="res-label">社交内耗指数</div>' +
        '<div class="res-value">'+socialLabel+'</div>' +
        '<div class="res-bar-wrap"><div class="res-bar"><div class="res-bar-fill" style="width:'+socialScore+'%;background:linear-gradient(90deg,#ff6ec4,#7928ca)"></div></div><div class="res-pct">'+socialScore+'%</div></div>' +
        '<div class="res-desc">'+socialDesc+'</div>' +
      '</div></div></div>' +

    '<div class="res-card">' +
      '<div class="res-section"><div class="res-icon">💼</div><div style="flex:1">' +
        '<div class="res-label">职场人格适配度</div>' +
        '<div class="res-value">'+workLabel+'</div>' +
        '<div class="res-bar-wrap"><div class="res-bar"><div class="res-bar-fill" style="width:'+workScore+'%;background:linear-gradient(90deg,'+color1+','+color2+')"></div></div><div class="res-pct">'+workScore+'%</div></div>' +
        '<div class="res-desc">'+workDesc+'</div>' +
      '</div></div></div>' +

    '<div class="res-card">' +
      '<div class="res-section"><div class="res-icon">💡</div><div><div class="res-label">职业建议</div><div class="res-desc">'+(careerAdvice[finalType]||careerAdvice["ENFP"])+'</div></div></div>' +
    '</div>' +

    '<button class="share-btn" onclick="shareResult()">📤 分享给朋友 · 一起测</button>' +
    '<button class="retry-btn" onclick="restartQuiz()">🔄 重新测试</button>' +
    '<div class="res-footer">吕勇军【平安金融科技集团】<br>测试结果仅供参考 · 祝你找到真实的自己</div>' +
  '</div>';
}

function shareResult(){
  if(navigator.share){
    navigator.share({title:'骨子里的你｜隐藏人格测试',text:'我测出了'+document.querySelector('.res-name').textContent+'！你也来试试？',url:window.location.href});
  }else{
    alert('请截图分享到朋友圈，或复制链接分享给朋友！');
  }
}

function restartQuiz(){
  document.getElementById('result-screen').style.display='none';
  document.getElementById('start-screen').style.display='flex';
  document.getElementById('progress-bar').style.width='0%';
}
</script>
